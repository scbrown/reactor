# Reactor configuration for quarterdeck comms bridge
#
# Watches steve_scratchpad (beads DB) for mail/issue events,
# dispatches to IRC channels via HTTP bridge.
# Uses binlog mode (sub-second GTID stream). Dolt 1.83.4 DOES support binlog
# source streaming once log_bin/gtid_mode/binlog_row_metadata=FULL are persisted
# (ss-dfyc, 2026-06-28; the old "no binlog on 1.83.x" note was a false negative).
# Auto-falls back to poll if @@log_bin is off or the stream errors.

[reactor]
dolt_host = "127.0.0.1"
dolt_port = 3307
dolt_user = "root"
dolt_password = ""
server_id = 100
mode = "binlog"                        # ss-dfyc: sub-second GTID stream; auto-falls back to poll if log_bin off
poll_interval = 3                      # seconds between polls
event_db = "steve_scratchpad"          # store reactor_events in same DB
health_port = 8075
log_level = "INFO"
watched_databases = ["steve_scratchpad", "gt"]

[dispatch]
irc_bridge_url = "http://127.0.0.1:8076/send"
telegram_bot_token = ""
telegram_chat_id = "8360797693"
telegram_webhook_secret = ""
github_webhook_secret = ""

# ── Event Classification ──────────────────────────────────────────
# Issues (beads)

[[classify]]
database = "steve_scratchpad"
table = "issues"
id_field = "id"
insert = "bead.created"
update = "bead.updated"
delete = "bead.deleted"
summary_template = "[{priority}] {title}"

[[classify.sub_classify]]
condition = "issue_type == 'decision'"
event_type = "decision.created"

# Overseer Deck quick-action → hitl-decision bead (ss-u72jx). issue_type is a
# first-class column (reactor-legible); the decision type + note live on the bead.
[[classify.sub_classify]]
condition = "issue_type == 'hitl-decision'"
event_type = "hitl_decision.created"

[[classify.update_fields]]
field = "status"
default_event = "bead.status_changed"

[[classify.update_fields.transitions]]
from = "open"
to = "in_progress"
event_type = "bead.claimed"

[[classify.update_fields.transitions]]
to = "closed"
event_type = "bead.closed"

[[classify.update_fields.transitions]]
to = "hooked"
event_type = "bead.hooked"

[[classify.update_fields]]
field = "assignee"
event_type = "bead.assigned"

# Wisps (ephemeral messages / mail)

[[classify]]
database = "gt"
table = "wisps"
id_field = "id"
insert = "mail.received"
update = "mail.updated"
summary_template = "{title}"

# ── Reaction Rules ────────────────────────────────────────────────

# High-priority beads → #alerts + Telegram
[[reactions]]
event = "bead.created"
condition = "priority <= 1"
actions = [
    { type = "irc", channel = "#alerts", template = "🔴 P{priority} {title} ({id}) — {created_by}" },
    { type = "telegram", template = "🔴 P{priority} bead: {title} ({id})\nCreated by: {created_by}" },
    { type = "log", template = "P{priority} bead created: {title}" },
]

# Normal bead creation → #crew
[[reactions]]
event = "bead.created"
condition = "priority > 1"
actions = [
    { type = "irc", channel = "#crew", template = "📋 {title} ({id}) P{priority} — {created_by}" },
]

# Bead closed → #crew
[[reactions]]
event = "bead.closed"
actions = [
    { type = "irc", channel = "#crew", template = "✓ Closed {id}: {title}" },
]

# Bead assigned → #crew
[[reactions]]
event = "bead.assigned"
actions = [
    { type = "irc", channel = "#crew", template = "→ {id} assigned to {assignee}" },
]

# Bead hooked → #crew
[[reactions]]
event = "bead.hooked"
actions = [
    { type = "irc", channel = "#crew", template = "🪝 {id} hooked: {title}" },
]

# Decision beads → #bridge + Telegram (interactive decision)
[[reactions]]
event = "decision.created"
actions = [
    { type = "irc", channel = "#bridge", template = "⚡ Decision needed: {title} ({id})" },
    { type = "telegram-decision", template = "⚡ Decision needed: {title} ({id})" },
]

# Overseer Deck action → WAKE Moneypenny to route it (ss-u72jx). MP is the router:
# the mail is a pointer to the bead ({id}); the decision type + free-text note live on
# the bead, NOT in this command. gt-mail is a PRIVILEGED sink → the source_db gate lets
# it fire only for binlog-sourced (trusted) hitl-decision beads, never a forged /event.
# NB: this reaction is dormant until the Deck /api/action producer lands (villiers, ss-1tyw4).
[[reactions]]
event = "hitl_decision.created"
actions = [
    { type = "gt-mail", target = "quarterdeck/crew/moneypenny", subject = "Deck action needs routing: {id}", template = "Steve took a Deck action on {id} ({title}). Route it — see the bead for the decision type + note." },
    { type = "irc", channel = "#crew", template = "🎛️  Deck action → MP route: {title} ({id})" },
]

# New mail → route to per-agent channel based on recipient
# (catch-all — more specific routing can be added)
[[reactions]]
event = "mail.received"
actions = [
    { type = "irc", channel = "#crew", template = "📬 {title} — from {sender}" },
]

# ── Patrol Notifications (injected via /event endpoint) ──────────

# Patrol alert → Telegram + IRC #alerts
[[reactions]]
event = "patrol.alert"
actions = [
    { type = "telegram", template = "🚨 PATROL: {title}\n{summary}" },
    { type = "irc", channel = "#alerts", template = "🚨 PATROL: {title} — {summary}" },
]

# Patrol warning → Telegram only
[[reactions]]
event = "patrol.warning"
actions = [
    { type = "telegram", template = "⚠️ PATROL: {title}\n{summary}" },
]

# ── Host Performance Alerts (injected by host-metrics-probe) ────

# Critical host alert → Telegram + IRC #alerts
[[reactions]]
event = "host.alert.critical"
actions = [
    { type = "telegram", template = "🚨 HOST CRITICAL: {title}\n{summary}" },
    { type = "irc", channel = "#alerts", template = "🚨 HOST CRITICAL: {title}" },
]

# Warning host alert → Telegram only
[[reactions]]
event = "host.alert.warn"
actions = [
    { type = "telegram", template = "⚠️ HOST WARN: {title}\n{summary}" },
]

# ── GitHub Webhook Events ─────────────────────────────────────────

# PR opened/reopened → #crew + log
[[reactions]]
event = "github.pr.opened"
actions = [
    { type = "irc", channel = "#crew", template = "🔀 PR opened: {summary}" },
    { type = "log", template = "GH PR opened: {summary}" },
]

[[reactions]]
event = "github.pr.reopened"
actions = [
    { type = "irc", channel = "#crew", template = "🔀 PR reopened: {summary}" },
]

# PR merged → #crew
[[reactions]]
event = "github.pr.merged"
actions = [
    { type = "irc", channel = "#crew", template = "✅ PR merged: {summary}" },
    { type = "log", template = "GH PR merged: {summary}" },
]

# PR closed (not merged) → #crew
[[reactions]]
event = "github.pr.closed"
actions = [
    { type = "irc", channel = "#crew", template = "❌ PR closed: {summary}" },
]

# Review approved → #crew + Telegram (steve-PRs getting approved)
[[reactions]]
event = "github.review.approved"
actions = [
    { type = "irc", channel = "#crew", template = "👍 Review approved: {summary}" },
    { type = "telegram", template = "👍 {summary}" },
]

# Review changes_requested → #crew + Telegram HIGH
[[reactions]]
event = "github.review.changes_requested"
actions = [
    { type = "irc", channel = "#crew", template = "🔴 Changes requested: {summary}" },
    { type = "telegram", template = "🔴 Changes requested: {summary}" },
]

# Review dismissed → #crew
[[reactions]]
event = "github.review.dismissed"
actions = [
    { type = "irc", channel = "#crew", template = "⚠️ Review dismissed: {summary}" },
]

# Review requested (Steve tagged as reviewer) → Telegram + #crew + log.
# Steve's primary ask (ss-s1bm / ss-n0icm). Sourced from the Notifications poller
# (gh-notif-poller.py → POST /event) today; the webhook classifier emits the same
# github.review_requested type once Lane 2 lands — one taxonomy, either transport.
# {summary} is composed upstream as "Review requested: <repo>#<pr> <title> by <author>".
[[reactions]]
event = "github.review_requested"
actions = [
    { type = "telegram", template = "👀 {summary}" },
    { type = "irc", channel = "#crew", template = "👀 {summary}" },
    { type = "log", template = "GH review requested: {summary}" },
]

# Mentions of Steve → Telegram + #crew + log (MVP default, design Open-Q #3).
[[reactions]]
event = "github.mention"
actions = [
    { type = "telegram", template = "📣 {summary}" },
    { type = "irc", channel = "#crew", template = "📣 {summary}" },
    { type = "log", template = "GH mention: {summary}" },
]

# CI failure → #alerts + Telegram HIGH
[[reactions]]
event = "github.ci.failure"
actions = [
    { type = "telegram", template = "🚨 CI FAILED: {summary}" },
    { type = "irc", channel = "#alerts", template = "🚨 CI FAILED: {summary}" },
]

# Comments on PRs → #crew
[[reactions]]
event = "github.comment"
actions = [
    { type = "irc", channel = "#crew", template = "💬 {summary}" },
]

# ── (b) Coordination nudges (ss-xskg, Steve-approved 2026-06-30) ──────────────────
# gt-relay (192.168.4.187:8076) is unreachable from steve-dev, so nudges go via the LOCAL
# `gt` CLI through reactor's shell sink, mail mode = durable + non-interrupting (moneypenny
# drains on patrol — matches the design's gt-nudge mode=queue intent). moneypenny is local
# crew, so local delivery is correct (no cross-host reach needed).
# SECURITY: shell=True — interpolate ONLY shell-safe slugs ({id}/{issue_id}/{label}), NEVER
# free-text {title} (decision beads can originate from untrusted Telegram inbound).

# decision.decided: _persist_decision writes a `decision:answer:<x>` row into the labels
# table; classify that insert into a decision.decided event carrying the answer label.
[[classify]]
database = "steve_scratchpad"
table = "labels"
id_field = "issue_id"
insert = "label.added"
summary_template = "{label} on {issue_id}"

[[classify.sub_classify]]
condition = "label.startswith('decision:answer:')"
event_type = "decision.decided"

# A decision is RAISED -> nudge coordination (in addition to the Overseer's Telegram).
[[reactions]]
event = "decision.created"
actions = [
    { type = "shell", command = "gt mail send quarterdeck/crew/moneypenny -s 'Decision pending Overseer ({id})' -m 'Reactor: decision bead {id} is awaiting the Overseer in Telegram. Durable nudge; look it up with: bd show {id}'" },
]

# A decision is ANSWERED -> let coordination learn the outcome without polling.
[[reactions]]
event = "decision.decided"
actions = [
    { type = "shell", command = "gt mail send quarterdeck/crew/moneypenny -s 'Decision answered ({issue_id})' -m 'Reactor: decision {issue_id} resolved -> {label}. Outcome propagated without polling.'" },
]
